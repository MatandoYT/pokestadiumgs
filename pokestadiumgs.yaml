name: Pokemon Stadium 2 (North America)
sha1: d8343e69a7dc63b869cf6361d87cde64444281d3
options:
  basename: pokestadiumgs
  target_path: baserom.z64
  base_path: .
  compiler: gcc
  find_file_boundaries: True
  header_encoding: ASCII
  platform: n64
  ld_script_path: pokestadiumgs.ld
  # undefined_funcs_auto: True
  # undefined_funcs_auto_path: undefined_funcs_auto.txt
  # undefined_syms_auto: True
  # undefined_syms_auto_path: undefined_syms_auto.txt
  symbol_addrs_path: tools/symbol_addrs.txt
  # asm_path: asm
  # src_path: src
  # build_path: build
  # extensions_path: tools/splat_ext
  # mips_abi_float_regs: o32
  # section_order: [".text", ".data", ".rodata", ".bss"]
  # auto_all_sections: [".data", ".rodata", ".bss"]
  # libultra_symbols: True
  # hardware_regs: True
segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: code
    start: 0x40
    vram: 0xA4000040
    files:
      - [0x0040, asm, boot]
      - [0x0B70, bin, bootcode_font]

  - name: code
    type: code
    start: 0x1000
    vram: 0x80000400
    files:
      [0x1000, asm] // ram main
      [0x1060, asm] // rsp graphics
      [0x]
